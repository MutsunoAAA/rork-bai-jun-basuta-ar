<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background: #000;
}
</style>
</head>
<body>
<div style="position:relative; width:1284px; height:2778px; overflow:hidden;">

  <!-- Background -->
  <img
    src="https://r2-pub.rork.com/app-store-screenshots/9bcbc3b7-5966-4b32-94a2-ccb1632d393d.png"
    style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block; z-index:0;"
    draggable="false"
  />

  <!-- Headline -->
  <div style="position:absolute; top:0; left:50%; width:80%; height:26%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center; z-index:20;">
    <h1 style="
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-weight: 900;
      font-size: 128px;
      line-height: 1.2;
      color: #ffffff;
      text-shadow:
        0 0 40px rgba(77, 216, 224, 0.9),
        0 0 80px rgba(77, 216, 224, 0.5),
        0 4px 24px rgba(0, 30, 60, 0.85),
        0 2px 8px rgba(0, 0, 0, 0.95);
      letter-spacing: -0.01em;
    ">ARで楽しく<br>シャカシャカ判定！</h1>
  </div>

  <!-- Device Mockup -->
  <div style="position:absolute; left:50%; bottom:0; width:86%; transform:translateX(-50%) translateY(6%); z-index:10;">
    <div style="position:relative; aspect-ratio:879/1832;">
      <div style="position:absolute; overflow:hidden; left:4.32%; top:2.29%; width:91.47%; height:95.41%; border-radius:7.5% / 3.5%;">
        <img src="screenshots/user/02_ar_camera.png" style="display:block; width:100%; height:100%; object-fit:cover; object-position:top;" draggable="false" />
      </div>
      <img src="https://r2-pub.rork.com/static/iphone-mockups/iphone-17-pro-cosmic-orange.png" style="position:relative; z-index:10; display:block; width:100%; height:100%; pointer-events:none;" draggable="false" />
    </div>
  </div>

</div>
</body>
</html>
